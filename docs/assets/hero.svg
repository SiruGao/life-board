<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Socratic Kernel</title>
  <desc id="desc">A local-first cognitive autonomy practice tool.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111512"/>
      <stop offset="0.55" stop-color="#1c2b21"/>
      <stop offset="1" stop-color="#2d4d39"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#d7b979" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#d7b979" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity="0.045"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="460" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="460" rx="30" fill="url(#glow)"/>
  <rect width="1200" height="460" rx="30" fill="url(#grid)"/>

  <g transform="translate(76 74)">
    <g filter="url(#shadow)">
      <circle cx="54" cy="54" r="54" fill="#f2eee3"/>
      <circle cx="54" cy="54" r="41" fill="#173c29"/>
      <path d="M37 31h37v10H53v16h18v10H53v24H41V41h-4z" fill="#f2eee3"/>
      <circle cx="77" cy="29" r="6" fill="#d8ae5e"/>
    </g>

    <text x="136" y="37" fill="#b8c8bd" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="4">LOCAL-FIRST COGNITIVE AUTONOMY</text>
    <text x="136" y="91" fill="#f7f3e9" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700">Socratic Kernel</text>
    <text x="136" y="130" fill="#d8ae5e" font-family="Arial, sans-serif" font-size="25" font-weight="700">内核</text>

    <text x="0" y="205" fill="#f7f3e9" font-family="Georgia, 'Times New Roman', serif" font-size="35">Answers can be outsourced.</text>
    <text x="0" y="250" fill="#f7f3e9" font-family="Georgia, 'Times New Roman', serif" font-size="35" font-weight="700">Judgment cannot.</text>
    <text x="0" y="292" fill="#b8c8bd" font-family="Inter, Arial, sans-serif" font-size="17">Write your position first. Examine assumptions, evidence, counterarguments, values, and responsibility.</text>

    <g transform="translate(0 330)" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">
      <g><rect width="112" height="36" rx="18" fill="#f2eee3" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.14"/><text x="56" y="23" text-anchor="middle" fill="#f2eee3">LOCAL-FIRST</text></g>
      <g transform="translate(124)"><rect width="98" height="36" rx="18" fill="#f2eee3" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.14"/><text x="49" y="23" text-anchor="middle" fill="#f2eee3">OFFLINE PWA</text></g>
      <g transform="translate(234)"><rect width="118" height="36" rx="18" fill="#f2eee3" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.14"/><text x="59" y="23" text-anchor="middle" fill="#f2eee3">NO TELEMETRY</text></g>
      <g transform="translate(364)"><rect width="120" height="36" rx="18" fill="#f2eee3" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.14"/><text x="60" y="23" text-anchor="middle" fill="#f2eee3">ZERO DEPENDENCY</text></g>
    </g>
  </g>

  <g transform="translate(882 230)" filter="url(#shadow)">
    <circle r="146" fill="#f2eee3" fill-opacity="0.055" stroke="#f2eee3" stroke-opacity="0.12"/>
    <circle r="111" fill="none" stroke="#d8ae5e" stroke-opacity="0.38"/>
    <circle r="77" fill="none" stroke="#f2eee3" stroke-opacity="0.25"/>
    <circle r="43" fill="#f2eee3" fill-opacity="0.12" stroke="#f2eee3" stroke-opacity="0.24"/>
    <circle r="8" fill="#d8ae5e"/>
    <g fill="#f2eee3" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">
      <text x="0" y="-124" text-anchor="middle">QUESTION</text>
      <text x="130" y="4" text-anchor="middle" transform="rotate(90 130 4)">EVIDENCE</text>
      <text x="0" y="138" text-anchor="middle">COUNTERARGUMENT</text>
      <text x="-130" y="4" text-anchor="middle" transform="rotate(-90 -130 4)">COMMITMENT</text>
    </g>
  </g>
</svg>
