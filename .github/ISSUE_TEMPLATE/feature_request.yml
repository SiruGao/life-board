name: Feature request
about: Propose a product, research, or engineering improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        功能建议需要说明它如何增强用户的独立判断，而不只是增加使用时长或互动次数。
  - type: textarea
    id: problem
    attributes:
      label: 需要解决的问题
      description: 请描述真实使用场景，而不是先描述解决方案。
      placeholder: 用户在什么时刻遇到什么问题？现有流程为什么不足？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述核心交互、数据流和边界。
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: 建议类型
      options:
        - 审议协议与问题设计
        - 浏览器扩展
        - 大模型与反迎合审查
        - 哲学知识与引用
        - 个人认知模型
        - 隐私与数据主权
        - 无障碍与本地化
        - 工程与部署
        - 研究与评估
        - 其他
    validations:
      required: true
  - type: textarea
    id: autonomy
    attributes:
      label: 对用户主体性的影响
      description: 用户在使用此功能后，会更能独立判断，还是更依赖系统？为什么？
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: 隐私与数据影响
      description: 是否新增采集、存储、同步或模型调用？用户如何查看和删除？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案与不做的代价
      description: 是否可以通过更简单方式解决？不开发会发生什么？
  - type: textarea
    id: success
    attributes:
      label: 如何判断功能有效
      description: 请避免只使用停留时长、会话数或留存率。
      placeholder: 例如：用户能否更早形成初步立场、主动提出反例或减少价值判断外包。
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已阅读产品原则和路线图。
          required: true
        - label: 该建议不会以制造依赖或隐藏画像为目标。
          required: true
