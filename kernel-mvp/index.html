<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="内核：一个不替你做决定的苏格拉底式思考训练工具。"
    />
    <meta name="theme-color" content="#111311" />
    <title>内核 · 认知自主权练习</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <header class="topbar">
      <a class="brand" href="#home" aria-label="返回首页">
        <span class="brand-mark">核</span>
        <span>
          <strong>内核</strong>
          <small>认知自主权练习</small>
        </span>
      </a>
      <nav class="nav" aria-label="主导航">
        <button class="nav-link active" data-route="home">今日</button>
        <button class="nav-link" data-route="new">开始审议</button>
        <button class="nav-link" data-route="history">思考档案</button>
        <button class="nav-link" data-route="data">数据</button>
      </nav>
      <button class="ghost-button compact" id="new-session-button">＋ 新审议</button>
    </header>

    <main id="app" tabindex="-1"></main>

    <footer class="footer">
      <p>内核不会替你决定。它只帮助你看见前提、反例、价值冲突与责任。</p>
      <p>所有内容默认仅保存在当前浏览器。</p>
    </footer>

    <template id="empty-template">
      <section class="empty-state">
        <span class="empty-icon">◌</span>
        <h2>还没有审议记录</h2>
        <p>从一个真实但不必宏大的问题开始。</p>
        <button class="primary-button" data-action="start">开始第一次审议</button>
      </section>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
